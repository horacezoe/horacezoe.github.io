<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="site-brand-name">{{ site.author.name }}</span>
      <span class="site-brand-tagline">Blog</span>
    </a>

    <nav class="site-nav" aria-label="主导航">
      <ul>
        {% for item in site.data.navigation %}
          {% assign item_path = item.url | remove: '/' %}
          {% assign page_path = page.url | remove: '/' | remove: 'index.html' %}
          <li>
            <a href="{{ item.url | relative_url }}"
               {% if item_path == page_path or item.url == page.url %}class="active"{% endif %}>
              {{ item.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
  {%- if page.title -%}
    {{ page.title }} · {{ site.title }}
  {%- else -%}
    {{ site.title }}
  {%- endif -%}
</title>
<meta name="description" content="{{ page.excerpt | default: page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
